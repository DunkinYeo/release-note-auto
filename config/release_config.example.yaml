# ──────────────────────────────────────────────────────────
# Release Note Auto — config template
# Copy to config/release_config.yaml and edit values below.
# ──────────────────────────────────────────────────────────

# product_type: sdk | app | fw
product_type: "sdk"

# product_name: shown in PDF header (auto-detected from tag if omitted)
#   sdk → "Wellysis" (default)
#   app → e.g. "S-patch Ex"
#   fw  → "Wellysis" (default)
product_name: ""

# tag: leave empty to auto-detect latest git tag
# Tag conventions:
#   SDK : ios-sdk-2.1.6  /  android-sdk-2.1.6
#   App : spatchex-ios-1.6.8  /  spatchex-android-1.6.8
#   FW  : fw-2.4.6
tag: ""

# date: official release date (empty = today)
date: ""

# platform / version: override tag-parsed values if needed
platform: ""   # iOS | Android | (empty for FW)
version: ""    # e.g. 2.1.6

# ── Content ───────────────────────────────────────────────
new_functionalities:
  - "New feature description here."

enhancements:
  - "Improved BLE stability."
  - "Error Handling, Timeout improvements."
  - "General Improvements - Bug fix."

previous_versions:
  - version: "v2.1.5"
    description: "Previous release summary"
  - version: "v2.1.4"
    description: "Previous release summary"

# ── Contact ───────────────────────────────────────────────
contact:
  email: "spatch.cardio@wellysis.com"
  phone: "+1 281 965 0330"
  address: "2450 Holcombe Blvd, Houston, TX 77021"

# ── Slack ─────────────────────────────────────────────────
# In GitHub Actions, webhook_url is injected from SLACK_WEBHOOK_URL secret.
# For local runs, set enabled: true and paste the URL below.
slack:
  enabled: false
  webhook_url: ""
  channel_note: ""
