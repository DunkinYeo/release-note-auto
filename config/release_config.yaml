change_categories:
  - title: "Reset Timing Change"
    items:
      - "Reset point moved from after exam end to before exam start — device retains data until next exam begins, then auto-resets."

  - title: "Device Connection Stability"
    items:
      - "Improved Bluetooth connection stability."
      - "Fixed intermittent disconnection (with error message output) occurring during connection attempts."

  - title: "Data Upload Process"
    items:
      - "Fixed Unzip failure issue."
      - "Fixed data packet corruption issue during upload."
      - "Fixed app crash when attempting to share file via email during upload."
      - "Fixed upload process halting after patching completes."

  - title: "Usability Improvements"
    items:
      - "Ex exam data can now be uploaded directly from the Medi app exam list."
      - "New exam can be started while a data upload is in progress."
      - "Navigation restrictions during upload improved — most pages now accessible."
      - "Hidden Tests excluded from the exam list (manageable via web portal)."
      - "Exam list screen loading speed improved."

  - title: "UI Changes"
    items:
      - "File management screen layout changed from card view to list view."
      - "Exam info screen UI updated."

  - title: "Bug Fixes"
    items:
      - "Fixed white screen displayed instead of graph in connected state."
      - "Fixed region select box overlapping ID input label on login screen."
      - "Fixed unresponsive button tap issue."
      - "Various additional UI improvements and bug fixes."

