name: SDK Release Notes

on:
  push:
    tags:
      - 'ios-sdk-*'
      - 'iOS-sdk-*'
      - 'android-sdk-*'
      - 'Android-sdk-*'
      - 'fw-*'
      - '*-ios-*'
      - '*-android-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (e.g. ios-sdk-2.1.7). Leave empty to use tag in config.'
        required: false
        default: ''
      platform:
        description: 'Platform override: iOS | Android. Leave empty to parse from tag.'
        required: false
        default: ''
      version:
        description: 'Version override (e.g. 2.1.7). Leave empty to parse from tag.'
        required: false
        default: ''
      product_type:
        description: 'Product type override: sdk | app | fw. Leave empty to parse from tag.'
        required: false
        default: ''
      product_name:
        description: 'Product name override (e.g. S-patch Ex). Leave empty to parse from tag.'
        required: false
        default: ''

jobs:
  generate:
    name: Generate Release Notes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate PDF & Screenshot (Slack disabled — notified separately)
        env:
          INPUT_TAG:          ${{ github.event.inputs.tag }}
          INPUT_PLATFORM:     ${{ github.event.inputs.platform }}
          INPUT_VERSION:      ${{ github.event.inputs.version }}
          INPUT_PRODUCT_TYPE: ${{ github.event.inputs.product_type }}
          INPUT_PRODUCT_NAME: ${{ github.event.inputs.product_name }}
        run: |
          # Temporarily disable Slack so main.py doesn't notify — workflow handles it
          python - <<'PY'
          import yaml
          with open("config/release_config.yaml") as f:
              cfg = yaml.safe_load(f)
          cfg.setdefault("slack", {})["enabled"] = False
          with open("config/release_config.yaml", "w") as f:
              yaml.dump(cfg, f, allow_unicode=True, default_flow_style=False)
          PY

          ARGS=()
          [ -n "$INPUT_TAG" ]          && ARGS+=(--tag          "$INPUT_TAG")
          [ -n "$INPUT_PLATFORM" ]     && ARGS+=(--platform     "$INPUT_PLATFORM")
          [ -n "$INPUT_VERSION" ]      && ARGS+=(--version      "$INPUT_VERSION")
          [ -n "$INPUT_PRODUCT_TYPE" ] && ARGS+=(--product-type "$INPUT_PRODUCT_TYPE")
          [ -n "$INPUT_PRODUCT_NAME" ] && ARGS+=(--product-name "$INPUT_PRODUCT_NAME")
          python main.py "${ARGS[@]}"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-pdf
          path: output/pdf/*.pdf
          retention-days: 90

      - name: Upload Screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-screenshot
          path: output/screenshot/*.png
          retention-days: 90

      - name: Notify Slack with content + download link
        env:
          SLACK_TOKEN:   ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import yaml, os, sys
          sys.path.insert(0, ".")
          from src.slack_notify import notify_slack

          with open("config/release_config.yaml") as f:
              cfg = yaml.safe_load(f)

          notify_slack(
              token        = os.environ.get("SLACK_TOKEN", ""),
              channel      = os.environ.get("SLACK_CHANNEL", ""),
              webhook_url  = os.environ.get("SLACK_WEBHOOK", ""),
              product_name = cfg.get("product_name", ""),
              version      = cfg.get("version", ""),
              date         = cfg.get("date", ""),
              product_type = cfg.get("product_type", "sdk"),
              new_functionalities = cfg.get("new_functionalities") or [],
              change_categories   = cfg.get("change_categories") or [],
              enhancements        = cfg.get("enhancements") or [],
              artifact_url = os.environ.get("RUN_URL", ""),
          )
          PY
