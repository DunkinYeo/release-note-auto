name: SDK Release Notes

on:
  push:
    tags:
      - 'ios-sdk-*'
      - 'iOS-sdk-*'
      - 'android-sdk-*'
      - 'Android-sdk-*'
      - 'fw-*'
      - '*-ios-*'
      - '*-android-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to generate release notes for (e.g. ios-sdk-2.1.5). Leave empty to auto-detect.'
        required: false
        default: ''
      platform:
        description: 'Platform override (iOS / Android). Leave empty to parse from tag.'
        required: false
        default: ''
      version:
        description: 'Version override (e.g. 2.1.5). Leave empty to parse from tag.'
        required: false
        default: ''

jobs:
  generate:
    name: Generate Release Notes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Inject Slack webhook from secret
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          python - <<'PY'
          import yaml, os, re

          cfg_path = "config/release_config.yaml"
          with open(cfg_path, "r") as f:
              cfg = yaml.safe_load(f)

          cfg.setdefault("slack", {})
          cfg["slack"]["enabled"] = True
          cfg["slack"]["webhook_url"] = os.environ["SLACK_WEBHOOK_URL"]

          with open(cfg_path, "w") as f:
              yaml.dump(cfg, f, allow_unicode=True, default_flow_style=False)
          PY

      - name: Generate PDF & Screenshot
        run: python main.py

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-pdf
          path: output/pdf/*.pdf
          retention-days: 90

      - name: Upload Screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-screenshot
          path: output/screenshot/*.png
          retention-days: 90

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          ARTIFACT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TAG="${GITHUB_REF_NAME}"
          PAYLOAD=$(cat <<JSON
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "SDK Release Notes Generated",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Tag:*\n\`${TAG}\`"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Status:*\nSuccess"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Artifacts (PDF + Screenshot):*\n<${ARTIFACT_URL}|View in GitHub Actions>"
                }
              }
            ]
          }
          JSON
          )
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
